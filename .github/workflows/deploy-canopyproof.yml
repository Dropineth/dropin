name: CanopyProof Production Deploy (Dry Run Only)

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Run dry-run validation only. Legacy live production deploy is disabled; use deploy-cloudflare-worker.yml for production."
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
      frontend_deploy_mode:
        description: "Frontend deploy path. Production UI deploy must use the OpenNext Worker path."
        required: true
        default: "opennext"
        type: choice
        options:
          - skip
          - opennext

concurrency:
  group: canopyproof-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Build, deploy, smoke test, and notify
    runs-on: ubuntu-latest
    environment: canopyproof-dry-run
    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: dropin-earth

    env:
      CANOPYPROOF_DOMAIN: canopyproof.org
      CANOPYPROOF_ZONE_NAME: canopyproof.org
      CF_PROJECT_NAME: canopyproof
      CF_BRANCH: ${{ github.ref_name }}
      WORKER_NAME: canopyproof-api-proxy
      WORKER_ROUTE: canopyproof.org/api/*
      WORKER_ZONE_NAME: canopyproof.org
      DROPIN_DEPLOY_MODE: ${{ inputs.deploy_mode }}
      DROPIN_FRONTEND_DEPLOY_MODE: ${{ inputs.frontend_deploy_mode }}
      DROPIN_CANOPYPROOF_MODE: production
      DROPIN_ALLOWED_ORIGINS: https://canopyproof.org,https://www.canopyproof.org
      DROPIN_ALLOW_ADMIN_PROXY: "false"
      DROPIN_API_ORIGIN: ${{ secrets.DROPIN_API_ORIGIN }}
      CF_API_TOKEN_PROD: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID_PROD: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_ZONE_ID_PROD: ${{ secrets.WORKER_ZONE_ID_PROD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DROPIN_OPENNEXT_DEPLOY_COMMAND: npm --workspace apps/web run cf:deploy
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DROPIN_SKIP_CI: "true"
      DROPIN_RUN_ANCHOR_TEST: "false"
      DROPIN_RUN_SMOKE: "true"
      DROPIN_SMOKE_BASE_URL: https://canopyproof.org
      DROPIN_NOTIFY_DEPLOYMENT: "true"
      DROPIN_NOTIFY_DRY_RUN: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Block legacy live production path
        run: |
          set -euo pipefail
          if [ "$DROPIN_DEPLOY_MODE" != "dry-run" ]; then
            echo "::error::Legacy live production deployment is disabled. Use deploy-cloudflare-worker.yml with target_sha, release-council approval evidence, and canopyproof-production required reviewers."
            exit 1
          fi
          echo "Legacy workflow is restricted to dry-run validation only."

      - name: Fail-fast secret and mode checks
        run: |
          case "$DROPIN_DEPLOY_MODE" in
            dry-run) ;;
            *)
              echo "::error::DROPIN_DEPLOY_MODE must be dry-run. Legacy live production deployment is disabled."
              exit 1
              ;;
          esac

          REQUIRED_VARS=(CF_API_TOKEN_PROD CF_ACCOUNT_ID_PROD)

          for var in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Required deployment secret or env var is missing: $var"
              exit 1
            fi
          done

          if [ -n "${DROPIN_API_ORIGIN:-}" ] && [[ "$DROPIN_API_ORIGIN" != https://* ]]; then
            echo "::error::DROPIN_API_ORIGIN must be HTTPS for production deployment."
            exit 1
          fi

          echo "CanopyProof deployment preflight passed."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dropin-earth/package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run release CI
        run: npm run ci

      - name: Install Wrangler
        run: npm install --global wrangler

      - name: Verify production guardrails
        run: |
          test "$CANOPYPROOF_DOMAIN" = "canopyproof.org"
          test "$WORKER_ROUTE" = "canopyproof.org/api/*"
          test "$WORKER_ZONE_NAME" = "canopyproof.org"
          test "$DROPIN_CANOPYPROOF_MODE" = "production"
          test "$DROPIN_ALLOW_ADMIN_PROXY" = "false"
          test "$DROPIN_DEPLOY_MODE" = "dry-run" || test "${DROPIN_CLOUDFLARE_DEPLOY_CONFIRM:-}" = "canopyproof.org"
          test "$DROPIN_FRONTEND_DEPLOY_MODE" = "skip" || test "$DROPIN_FRONTEND_DEPLOY_MODE" = "opennext"
          test "$DROPIN_OPENNEXT_DEPLOY_COMMAND" = "npm --workspace apps/web run cf:deploy"

      - name: Deploy OpenNext frontend and API Worker
        run: ./deploy-canopyproof-auto.sh

      - name: Smoke test production
        if: env.DROPIN_DEPLOY_MODE == 'live'
        run: |
          python3 scripts/check-canopyproof.py \
            --domain canopyproof.org \
            --www-domain www.canopyproof.org \
            --require-www \
            --api-ready-path /api/ready \
            --admin-path /api/admin/launch/readiness \
            --json-report canopyproof-smoke-report.json

      - name: Deployment summary
        if: always()
        run: |
          echo "domain=$CANOPYPROOF_DOMAIN"
          echo "deploy_mode=$DROPIN_DEPLOY_MODE"
          echo "frontend_deploy_mode=$DROPIN_FRONTEND_DEPLOY_MODE"
          echo "worker_route=$WORKER_ROUTE"
          echo "admin_proxy=$DROPIN_ALLOW_ADMIN_PROXY"
