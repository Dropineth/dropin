name: Dropin Earth CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dropin-earth/package-lock.json
      - name: Install
        working-directory: dropin-earth
        run: npm install
      - name: Verify
        working-directory: dropin-earth
        run: npm run ci
